<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speelplanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun: #FFD447;
    --sky: #4FBBF0;
    --grass: #3EC97C;
    --coral: #FF6B6B;
    --purple: #A78BFA;
    --navy: #1E2B4A;
    --cream: #FFFBF0;
    --card: #FFFFFF;
    --muted: #8896B0;
    --border: #E8EDF5;
    --shadow: 0 4px 20px rgba(30,43,74,0.10);
    --shadow-lg: 0 8px 40px rgba(30,43,74,0.15);
    --radius: 18px;
    --radius-sm: 10px;
  }

  html, body {
    min-height: 100%;
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    color: var(--navy);
    font-size: 16px;
  }

  /* ===== PAGES ===== */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* ===== AUTH PAGE ===== */
  #page-auth {
    background: linear-gradient(160deg, #4FBBF0 0%, #A78BFA 50%, #3EC97C 100%);
    justify-content: center; align-items: center;
    padding: 24px;
  }
  .auth-card {
    background: white;
    border-radius: 28px;
    padding: 40px 36px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.5s ease;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 28px;
  }
  .auth-logo .logo-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 8px;
  }
  .auth-logo h1 {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    color: var(--navy);
    line-height: 1;
  }
  .auth-logo p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }
  .tab-btns {
    display: flex;
    background: var(--border);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1; padding: 10px;
    border: none; background: transparent;
    border-radius: 9px; cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: white;
    color: var(--navy);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  /* ===== FORMS ===== */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-weight: 700; font-size: 0.85rem;
    color: var(--navy); margin-bottom: 6px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem; color: var(--navy);
    background: #FAFBFD;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--sky);
    background: white;
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  /* ===== BUTTONS ===== */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 1rem;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--sky); color: white;
    width: 100%;
    box-shadow: 0 4px 12px rgba(79,187,240,0.35);
  }
  .btn-primary:hover { background: #3AADD8; transform: translateY(-1px); }
  .btn-green {
    background: var(--grass); color: white;
    box-shadow: 0 4px 12px rgba(62,201,124,0.35);
  }
  .btn-green:hover { background: #32B06A; transform: translateY(-1px); }
  .btn-coral {
    background: var(--coral); color: white;
    box-shadow: 0 4px 12px rgba(255,107,107,0.3);
  }
  .btn-purple {
    background: var(--purple); color: white;
    box-shadow: 0 4px 12px rgba(167,139,250,0.35);
  }
  .btn-sun {
    background: var(--sun); color: var(--navy);
    box-shadow: 0 4px 12px rgba(255,212,71,0.4);
  }
  .btn-outline {
    background: transparent; color: var(--navy);
    border: 2px solid var(--border);
  }
  .btn-outline:hover { border-color: var(--sky); color: var(--sky); }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }
  .btn-full { width: 100%; }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }

  /* ===== TOP NAV ===== */
  .topnav {
    background: white;
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(30,43,74,0.06);
  }
  .topnav .logo {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem; color: var(--navy);
    display: flex; align-items: center; gap: 8px;
  }
  .topnav .logo span { font-size: 1.5rem; }
  .nav-actions { display: flex; gap: 8px; align-items: center; }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--sky), var(--purple));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 800; font-size: 0.9rem;
    cursor: pointer;
  }

  /* ===== BOTTOM NAV ===== */
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
    box-shadow: 0 -4px 20px rgba(30,43,74,0.08);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 4px;
    cursor: pointer; border: none; background: transparent;
    color: var(--muted); font-family: 'Nunito', sans-serif;
    font-size: 0.7rem; font-weight: 700;
    transition: color 0.2s;
    gap: 3px;
  }
  .nav-item .nav-icon { font-size: 1.4rem; }
  .nav-item.active { color: var(--sky); }
  .nav-item.active .nav-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--sky); margin-top: 2px;
  }

  /* ===== CONTENT ===== */
  .content {
    flex: 1;
    padding: 20px 16px 90px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== SECTION HEADER ===== */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem; color: var(--navy);
  }

  /* ===== CARDS ===== */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }
  .card-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
  }
  .card-icon {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; flex-shrink: 0;
  }
  .card-icon.sky { background: rgba(79,187,240,0.15); }
  .card-icon.grass { background: rgba(62,201,124,0.15); }
  .card-icon.sun { background: rgba(255,212,71,0.15); }
  .card-icon.coral { background: rgba(255,107,107,0.15); }
  .card-icon.purple { background: rgba(167,139,250,0.15); }
  .card-title { font-weight: 800; font-size: 1rem; margin-bottom: 2px; }
  .card-sub { color: var(--muted); font-size: 0.82rem; }
  .card-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 10px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--border); border-radius: 20px;
    padding: 4px 10px; font-size: 0.8rem; font-weight: 700;
    color: var(--navy);
  }
  .chip.sky { background: rgba(79,187,240,0.15); color: #2A8DB8; }
  .chip.grass { background: rgba(62,201,124,0.15); color: #248A52; }
  .chip.sun { background: rgba(255,212,71,0.2); color: #997A00; }
  .chip.coral { background: rgba(255,107,107,0.15); color: #CC3333; }
  .chip.purple { background: rgba(167,139,250,0.15); color: #6D4ADB; }

  /* ===== INVITE CODE ===== */
  .invite-box {
    background: linear-gradient(135deg, rgba(79,187,240,0.1), rgba(167,139,250,0.1));
    border: 2px dashed var(--sky);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 10px;
  }
  .invite-code {
    font-family: 'Baloo 2', cursive;
    font-size: 1.6rem; letter-spacing: 4px;
    color: var(--navy);
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.95rem; margin-bottom: 16px; }

  /* ===== STATUS BADGE ===== */
  .status-badge {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 800;
  }
  .status-open { background: rgba(62,201,124,0.15); color: #248A52; }
  .status-matched { background: rgba(79,187,240,0.15); color: #2A8DB8; }
  .status-closed { background: rgba(142,150,176,0.15); color: var(--muted); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none; position: fixed;
    inset: 0; background: rgba(30,43,74,0.5);
    z-index: 200; align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 28px 28px 0 0;
    padding: 28px 24px 40px;
    width: 100%; max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.35s ease;
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border); border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.4rem; margin-bottom: 20px;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy); color: white;
    padding: 12px 24px; border-radius: 50px;
    font-weight: 700; font-size: 0.9rem;
    opacity: 0; transition: all 0.3s;
    z-index: 500; white-space: nowrap;
    pointer-events: none;
    box-shadow: var(--shadow-lg);
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ===== HERO BANNER ===== */
  .hero-banner {
    background: linear-gradient(135deg, var(--sky), var(--purple));
    border-radius: var(--radius);
    padding: 24px;
    color: white;
    margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .hero-banner::before {
    content: '🌤️';
    position: absolute; right: 20px; top: 16px;
    font-size: 3.5rem; opacity: 0.3;
  }
  .hero-banner h2 {
    font-family: 'Baloo 2', cursive;
    font-size: 1.5rem; margin-bottom: 4px;
  }
  .hero-banner p { opacity: 0.85; font-size: 0.9rem; }

  /* ===== RESPONSE ACTIONS ===== */
  .response-actions {
    display: flex; gap: 8px; margin-top: 12px;
  }

  /* ===== CHILD CARD ===== */
  .child-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px; background: white;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    margin-bottom: 10px;
  }
  .child-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sun), var(--coral));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; flex-shrink: 0;
  }

  /* ===== LOADING ===== */
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  .loading-state {
    text-align: center; padding: 40px;
    color: var(--muted); font-size: 1.5rem;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ===== DESKTOP ===== */
  @media (min-width: 640px) {
    .content { padding: 28px 20px 90px; }
    .auth-card { padding: 48px 44px; }
    .modal { border-radius: 28px; margin-bottom: 40px; }
    .modal-overlay { align-items: center; }
  }

  /* ===== UTILITY ===== */
  .text-center { text-align: center; }
  .mt-8 { margin-top: 8px; }
  .mt-16 { margin-top: 16px; }
  .mt-24 { margin-top: 24px; }
  .flex { display: flex; }
  .gap-8 { gap: 8px; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .text-muted { color: var(--muted); font-size: 0.85rem; }
</style>
</head>
<body>

<!-- ======== AUTH PAGE ======== -->
<div id="page-auth" class="page active">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🛝</span>
      <h1>Speelplanner</h1>
      <p>Speelafspraken makkelijk gemaakt</p>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchAuthTab('login')">Inloggen</button>
      <button class="tab-btn" onclick="switchAuthTab('register')">Account aanmaken</button>
    </div>

    <!-- Login -->
    <div id="auth-login">
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="login-email" placeholder="jouw@email.nl">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary mt-16" onclick="handleLogin()" id="btn-login">
        Inloggen
      </button>
    </div>

    <!-- Register -->
    <div id="auth-register" style="display:none">
      <div class="form-group">
        <label>Jouw naam</label>
        <input type="text" id="reg-name" placeholder="Bijv. Laura de Vries">
      </div>
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="reg-email" placeholder="jouw@email.nl">
      </div>
      <div class="form-group">
        <label>Wachtwoord</label>
        <input type="password" id="reg-password" placeholder="Minimaal 6 tekens">
      </div>
      <button class="btn btn-primary mt-16" onclick="handleRegister()" id="btn-register">
        Account aanmaken
      </button>
    </div>
  </div>
</div>

<!-- ======== APP SHELL ======== -->
<div id="app-shell" style="display:none; min-height:100vh; flex-direction:column; display:none">

  <!-- Top nav -->
  <nav class="topnav">
    <div class="logo"><span>🛝</span> Speelplanner</div>
    <div class="nav-actions">
      <div class="avatar" id="user-avatar" onclick="showProfile()">?</div>
    </div>
  </nav>

  <!-- Pages -->
  <div id="page-home" class="page active" style="display:flex">
    <div class="content">
      <div id="hero-section" class="hero-banner">
        <h2>Hallo! 👋</h2>
        <p>Bekijk je groepen en plan een speelafspraak</p>
      </div>
      <div class="section-header">
        <div class="section-title">Mijn groepen</div>
        <button class="btn btn-sm btn-outline" onclick="openModal('modal-join')">+ Joinen</button>
      </div>
      <div id="groups-list"><div class="loading-state">⏳</div></div>
      <div class="grid-2 mt-16">
        <button class="btn btn-green" onclick="goTo('page-create-group')">➕ Groep aanmaken</button>
        <button class="btn btn-sky btn-outline" onclick="openModal('modal-join')">🔗 Code invoeren</button>
      </div>
    </div>
  </div>

  <div id="page-group-detail" class="page" style="display:none">
    <div class="content">
      <button class="btn btn-outline btn-sm mb-16" onclick="goTo('page-home')" style="margin-bottom:14px">← Terug</button>
      <div id="group-detail-content"><div class="loading-state">⏳</div></div>
    </div>
  </div>

  <div id="page-requests" class="page" style="display:none">
    <div class="content">
      <div class="section-header">
        <div class="section-title">Oproepen</div>
        <button class="btn btn-sm btn-sun" onclick="openModal('modal-new-request')">+ Nieuw</button>
      </div>
      <div id="group-filter" style="margin-bottom:14px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px"></div>
      <div id="requests-list"><div class="loading-state">⏳</div></div>
    </div>
  </div>

  <div id="page-children" class="page" style="display:none">
    <div class="content">
      <div class="section-header">
        <div class="section-title">Mijn kinderen</div>
        <button class="btn btn-sm btn-sun" onclick="openModal('modal-add-child')">+ Toevoegen</button>
      </div>
      <div id="children-list"><div class="loading-state">⏳</div></div>
    </div>
  </div>

  <div id="page-create-group" class="page" style="display:none">
    <div class="content">
      <button class="btn btn-outline btn-sm" onclick="goTo('page-home')" style="margin-bottom:20px">← Terug</button>
      <div class="section-title" style="margin-bottom:20px">📋 Groep aanmaken</div>
      <div class="card">
        <div class="form-group">
          <label>Groepsnaam</label>
          <input type="text" id="group-name" placeholder="Bijv. Klas 3B De Regenboog">
        </div>
        <div class="form-group">
          <label>Omschrijving (optioneel)</label>
          <textarea id="group-desc" placeholder="Bijv. Ouders van klas 3B..."></textarea>
        </div>
        <button class="btn btn-green btn-full" onclick="createGroup()">Groep aanmaken</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav class="bottomnav">
    <button class="nav-item active" id="nav-home" onclick="goTo('page-home')">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
      <div class="nav-dot"></div>
    </button>
    <button class="nav-item" id="nav-requests" onclick="goTo('page-requests')">
      <span class="nav-icon">📅</span>
      <span>Oproepen</span>
    </button>
    <button class="nav-item" id="nav-children" onclick="goTo('page-children')">
      <span class="nav-icon">👧</span>
      <span>Kinderen</span>
    </button>
  </nav>
</div>

<!-- ======== MODALS ======== -->

<!-- Join group -->
<div id="modal-join" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🔗 Groep joinen</div>
    <div class="form-group">
      <label>Uitnodigingscode</label>
      <input type="text" id="join-code" placeholder="Bijv. ABC123" maxlength="8" style="text-transform:uppercase;letter-spacing:3px;font-size:1.2rem;font-weight:800;text-align:center">
    </div>
    <div class="grid-2 mt-16">
      <button class="btn btn-outline" onclick="closeModal('modal-join')">Annuleren</button>
      <button class="btn btn-sky" onclick="joinGroup()">Joinen!</button>
    </div>
  </div>
</div>

<!-- Add child -->
<div id="modal-add-child" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">👧 Kind toevoegen</div>
    <div class="form-group">
      <label>Naam van het kind</label>
      <input type="text" id="child-name" placeholder="Bijv. Emma">
    </div>
    <div class="form-group">
      <label>Geboortedatum</label>
      <input type="date" id="child-dob">
    </div>
    <div class="grid-2 mt-16">
      <button class="btn btn-outline" onclick="closeModal('modal-add-child')">Annuleren</button>
      <button class="btn btn-sun" onclick="addChild()">Toevoegen</button>
    </div>
  </div>
</div>

<!-- New play request -->
<div id="modal-new-request" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">📅 Oproep plaatsen</div>
    <div class="form-group">
      <label>Groep</label>
      <select id="req-group-id"></select>
    </div>
    <div class="form-group">
      <label>Datum</label>
      <input type="date" id="req-date">
    </div>
    <div class="grid-2">
      <div class="form-group">

<!-- Toast -->
<div id="toast"></div>

<script>
// ======================================
// SUPABASE CONFIG
// ⚠️  VERVANG DEZE WAARDEN MET JE EIGEN SUPABASE GEGEVENS
// Ga naar: https://app.supabase.com → Settings → API
// ======================================
const SUPABASE_URL = 'https://cxpngxpjuenasrbtksls.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN4cG5neHBqdWVuYXNyYnRrc2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTYxMTksImV4cCI6MjA5MDE5MjExOX0.tgqNtW5_Qg0Bhg258Sg0xVand5wzV969njlTZ7eQRcQ';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ======================================
// STATE
// ======================================
let currentUser = null;
let userProfile = null;
let myGroups = [];
let selectedGroupFilter = null;
let activeRequestId = null;

// ======================================
// INIT
// ======================================
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await afterLogin(session.user);
  }
  
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      await afterLogin(session.user);
    } else if (event === 'SIGNED_OUT') {
      showAuthPage();
    }
  });
}

async function afterLogin(user) {
  currentUser = user;
  await ensureProfile(user);
  showApp();
  loadHome();
}

async function ensureProfile(user) {
  const { data } = await sb.from('users').select('*').eq('id', user.id).single();
  if (!data) {
    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    await sb.from('users').insert({ id: user.id, email: user.email, full_name: name });
    userProfile = { id: user.id, email: user.email, full_name: name };
  } else {
    userProfile = data;
  }
  // Set avatar
  const initials = (userProfile.full_name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('hero-section').querySelector('h2').textContent = 
    `Hallo, ${(userProfile.full_name || '').split(' ')[0]}! 👋`;
}

// ======================================
// AUTH
// ======================================
function switchAuthTab(tab) {
  document.getElementById('auth-login').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('auth-register').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showToast('Vul alle velden in'); return; }
  const btn = document.getElementById('btn-login');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  btn.innerHTML = 'Inloggen';
  btn.disabled = false;
  if (error) showToast('❌ ' + (error.message.includes('Invalid') ? 'Verkeerd e-mail of wachtwoord' : error.message));
}

async function handleRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) { showToast('Vul alle velden in'); return; }
  if (password.length < 6) { showToast('Wachtwoord moet minimaal 6 tekens zijn'); return; }
  const btn = document.getElementById('btn-register');
  btn.innerHTML = '<div class="spinner"></div>';
  btn.disabled = true;
  const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
  btn.innerHTML = 'Account aanmaken';
  btn.disabled = false;
  if (error) { showToast('❌ ' + error.message); return; }
  if (data.user && !data.session) {
    showToast('✉️ Check je e-mail om te bevestigen!');
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  closeModal('modal-profile');
}

// ======================================
// GROUPS
// ======================================
async function loadHome() {
  const el = document.getElementById('groups-list');
  el.innerHTML = '<div class="loading-state">⏳</div>';
  
  const { data, error } = await sb
    .from('group_members')
    .select('role, groups(id, name, description, invite_code, created_by)')
    .eq('user_id', currentUser.id);

  if (error || !data) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><p>Kon groepen niet laden</p></div>'; return; }
  
  myGroups = data.map(d => ({ ...d.groups, role: d.role })).filter(Boolean);
  
  if (myGroups.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🏫</div>
      <p>Je bent nog geen lid van een groep</p>
    </div>`;
    return;
  }
  
  el.innerHTML = myGroups.map(g => `
    <div class="card" onclick="openGroupDetail('${g.id}')">
      <div class="card-header">
        <div class="card-icon sky">🏫</div>
        <div>
          <div class="card-title">${escHtml(g.name)}</div>
          <div class="card-sub">${escHtml(g.description || 'Geen omschrijving')}</div>
        </div>
      </div>
      <div class="card-meta">
        <span class="chip sky">👤 ${g.role === 'admin' ? 'Beheerder' : 'Lid'}</span>
      </div>
    </div>
  `).join('');
}

async function openGroupDetail(groupId) {
  goTo('page-group-detail');
  const el = document.getElementById('group-detail-content');
  el.innerHTML = '<div class="loading-state">⏳</div>';
  
  const { data: group } = await sb.from('groups').select('*').eq('id', groupId).single();
  const { data: members } = await sb.from('group_members')
    .select('role, users(id, full_name, email)')
    .eq('group_id', groupId);
  
  if (!group) { el.innerHTML = '<p>Groep niet gevonden</p>'; return; }
  
  const isAdmin = members?.some(m => m.users?.id === currentUser.id && m.role === 'admin');
  
  el.innerHTML = `
    <div class="hero-banner" style="background: linear-gradient(135deg, var(--grass), var(--sky))">
      <h2>🏫 ${escHtml(group.name)}</h2>
      <p>${escHtml(group.description || '')}</p>
    </div>
    
    ${isAdmin ? `
    <div class="card">
      <div class="card-title" style="margin-bottom:10px">📨 Uitnodigingscode</div>
      <div class="invite-box">
        <div class="invite-code">${group.invite_code}</div>
        <button class="btn btn-sm btn-sky" onclick="copyCode('${group.invite_code}')">Kopiëren</button>
      </div>
      <p class="text-muted mt-8">Deel deze code met andere ouders</p>
    </div>` : ''}
    
    <div class="section-header" style="margin-top:4px">
      <div class="section-title">Leden (${members?.length || 0})</div>
    </div>
    ${(members || []).map(m => `
      <div class="child-card">
        <div class="child-avatar">👤</div>
        <div>
          <div style="font-weight:800">${escHtml(m.users?.full_name || 'Onbekend')}</div>
          <div class="text-muted">${m.role === 'admin' ? '⭐ Beheerder' : 'Lid'}</div>
        </div>
      </div>
    `).join('')}
    
    <button class="btn btn-coral btn-full" style="margin-top:20px" onclick="leaveGroup('${groupId}')">
      Groep verlaten
    </button>
  `;
}

async function createGroup() {
  const name = document.getElementById('group-name').value.trim();
  const desc = document.getElementById('group-desc').value.trim();
  if (!name) { showToast('Vul een naam in'); return; }
  
  const code = generateCode();
  const { data, error } = await sb.from('groups').insert({
    name, description: desc, invite_code: code, created_by: currentUser.id
  }).select().single();
  
  if (error || !data) { showToast('❌ ' + (error?.message || 'Fout')); return; }
  
  await sb.from('group_members').insert({ group_id: data.id, user_id: currentUser.id, role: 'admin' });
  
  showToast('✅ Groep aangemaakt!');
  document.getElementById('group-name').value = '';
  document.getElementById('group-desc').value = '';
  goTo('page-home');
  loadHome();
}

async function joinGroup() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  if (!code) { showToast('Voer een code in'); return; }
  
  const { data: group } = await sb.from('groups').select('*').eq('invite_code', code).single();
  if (!group) { showToast('❌ Ongeldige code'); return; }
  
  const { data: existing } = await sb.from('group_members')
    .select('id').eq('group_id', group.id).eq('user_id', currentUser.id).single();
  
  if (existing) { showToast('Je bent al lid van deze groep'); closeModal('modal-join'); return; }
  
  const { error } = await sb.from('group_members').insert({ group_id: group.id, user_id: currentUser.id, role: 'member' });
  if (error) { showToast('❌ ' + error.message); return; }
  
  showToast(`✅ Welkom bij ${group.name}!`);
  document.getElementById('join-code').value = '';
  closeModal('modal-join');
  loadHome();
}

async function leaveGroup(groupId) {
  if (!confirm('Weet je zeker dat je de groep wilt verlaten?')) return;
  await sb.from('group_members').delete().eq('group_id', groupId).eq('user_id', currentUser.id);
  showToast('Je hebt de groep verlaten');
  goTo('page-home');
  loadHome();
}

// ======================================
// CHILDREN
// ======================================
async function loadChildren() {
  const el = document.getElementById('children-list');
  el.innerHTML = '<div class="loading-state">⏳</div>';
  
  const { data } = await sb.from('children').select('*').eq('user_id', currentUser.id);
  
  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">👶</div>
      <p>Nog geen kinderen toegevoegd</p>
      <button class="btn btn-sun" onclick="openModal('modal-add-child')">+ Kind toevoegen</button>
    </div>`;
    return;
  }
  
  el.innerHTML = data.map(c => {
    const age = c.date_of_birth ? Math.floor((new Date() - new Date(c.date_of_birth)) / 31557600000) : null;
    return `<div class="child-card">
      <div class="child-avatar">🧒</div>
      <div style="flex:1">
        <div style="font-weight:800;font-size:1rem">${escHtml(c.name)}</div>
        ${age !== null ? `<div class="text-muted">${age} jaar</div>` : ''}
      </div>
      <button class="btn btn-sm btn-outline" onclick="deleteChild('${c.id}')">🗑️</button>
    </div>`;
  }).join('');
}

async function addChild() {
  const name = document.getElementById('child-name').value.trim();
  const dob = document.getElementById('child-dob').value;
  if (!name) { showToast('Vul een naam in'); return; }
  
  const { error } = await sb.from('children').insert({ name, date_of_birth: dob || null, user_id: currentUser.id });
  if (error) { showToast('❌ ' + error.message); return; }
  
  showToast('✅ Kind toegevoegd!');
  document.getElementById('child-name').value = '';
  document.getElementById('child-dob').value = '';
  closeModal('modal-add-child');
  loadChildren();
}

async function deleteChild(id) {
  if (!confirm('Kind verwijderen?')) return;
  await sb.from('children').delete().eq('id', id);
  loadChildren();
}

// ======================================
// PLAY REQUESTS
// ======================================
async function loadRequests() {
  const el = document.getElementById('requests-list');
  el.innerHTML = '<div class="loading-state">⏳</div>';
  
  // Load group filter buttons
  const filterEl = document.getElementById('group-filter');
  filterEl.innerHTML = `<button class="btn btn-sm ${!selectedGroupFilter ? 'btn-sky' : 'btn-outline'}" onclick="filterRequests(null)">Alle groepen</button>`;
  myGroups.forEach(g => {
    filterEl.innerHTML += `<button class="btn btn-sm ${selectedGroupFilter === g.id ? 'btn-sky' : 'btn-outline'}" onclick="filterRequests('${g.id}')">${escHtml(g.name)}</button>`;
  });
  
  if (myGroups.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div><p>Word eerst lid van een groep om oproepen te zien</p></div>`;
    return;
  }
  
  const groupIds = selectedGroupFilter ? [selectedGroupFilter] : myGroups.map(g => g.id);
  
  // Get members from those groups to find all requesters
  const { data: memberData } = await sb.from('group_members')
    .select('user_id').in('group_id', groupIds);
  
  const userIds = [...new Set((memberData || []).map(m => m.user_id))];
  
  const { data: requests } = await sb
    .from('play_requests')
    .select('*, users(full_name)')
    .in('requester_id', userIds)
    .neq('status', 'closed')
    .order('date', { ascending: true });
  
  if (!requests || requests.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🌤️</div>
      <p>Nog geen oproepen. Wees de eerste!</p>
      <button class="btn btn-coral" onclick="openNewRequestModal()">+ Oproep plaatsen</button>
    </div>`;
    return;
  }
  
  // Load responses for each request
  const { data: allResponses } = await sb
    .from('responses')
    .select('request_id, status, user_id, message, users(full_name)')
    .in('request_id', requests.map(r => r.id));
  
  el.innerHTML = requests.map(req => {
    const responses = (allResponses || []).filter(r => r.request_id === req.id);
    const myResponse = responses.find(r => r.user_id === currentUser.id);
    const yesCount = responses.filter(r => r.status === 'yes').length;
    const isOwn = req.requester_id === currentUser.id;
    
    const dateStr = new Date(req.date).toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    
    return `<div class="card">
      <div class="card-header">
        <div class="card-icon ${isOwn ? 'sun' : 'sky'}">${isOwn ? '⭐' : '🧒'}</div>
        <div style="flex:1">
          <div class="card-title">${escHtml(req.users?.full_name || 'Onbekend')}</div>
          <div class="card-sub">${dateStr}</div>
        </div>
        <span class="status-badge status-${req.status || 'open'}">${req.status === 'matched' ? '🔵 Match!' : '🟢 Open'}</span>
      </div>
      <div class="card-meta">
        ${req.time_from ? `<span class="chip sky">⏰ ${req.time_from.slice(0,5)}${req.time_to ? ' – ' + req.time_to.slice(0,5) : ''}</span>` : ''}
        ${req.location_pref ? `<span class="chip grass">📍 ${escHtml(req.location_pref)}</span>` : ''}
        ${yesCount > 0 ? `<span class="chip sun">✅ ${yesCount} interesse</span>` : ''}
      </div>
      ${responses.length > 0 ? `
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
          ${responses.slice(0,3).map(r => `
            <div class="text-muted" style="font-size:0.82rem;margin-bottom:3px">
              ${r.status === 'yes' ? '✅' : r.status === 'maybe' ? '🤔' : '❌'} 
              <strong>${escHtml(r.users?.full_name || '')}</strong>
              ${r.message ? ': ' + escHtml(r.message) : ''}
            </div>
          `).join('')}
        </div>` : ''}
      <div class="response-actions">
        ${!isOwn ? `
          <button class="btn btn-sm ${myResponse ? 'btn-outline' : 'btn-grass'} btn-full" 
            onclick="openResponseModal('${req.id}', '${escHtml(req.users?.full_name || '')}', '${dateStr}')">
            ${myResponse ? (myResponse.status === 'yes' ? '✅ Jij kunt!' : myResponse.status === 'maybe' ? '🤔 Misschien' : '❌ Niet') : '💬 Reageren'}
          </button>` : `
          <button class="btn btn-sm btn-outline btn-full" onclick="closeRequest('${req.id}')">Sluiten</button>`}
      </div>
    </div>`;
  }).join('');
}

async function openNewRequestModal() {
  // Populate group dropdown
  const sel = document.getElementById('req-group-id');
  sel.innerHTML = myGroups.map(g => `<option value="${g.id}">${escHtml(g.name)}</option>`).join('');
  // Set default date to today
  document.getElementById('req-date').value = new Date().toISOString().split('T')[0];
  openModal('modal-new-request');
}

async function createRequest() {
  const groupId = document.getElementById('req-group-id').value;
  const date = document.getElementById('req-date').value;
  const timeFrom = document.getElementById('req-time-from').value;
  const timeTo = document.getElementById('req-time-to').value;
  const location = document.getElementById('req-location').value.trim();
  
  if (!date) { showToast('Kies een datum'); return; }
  
  const { error } = await sb.from('play_requests').insert({
    requester_id: currentUser.id,
    group_id: groupId,
    date,
    time_from: timeFrom || null,
    time_to: timeTo || null,
    location_pref: location || null,
    status: 'open'
  });
  
  if (error) { showToast('❌ ' + error.message); return; }
  
  showToast('🎉 Oproep geplaatst!');
  closeModal('modal-new-request');
  loadRequests();
}

function openResponseModal(requestId, requesterName, dateStr) {
  document.getElementById('response-request-id').value = requestId;
  document.getElementById('response-request-info').innerHTML = `
    <div class="card" style="margin:0;background:var(--border)">
      <strong>${escHtml(requesterName)}</strong> zoekt een speelafspraak<br>
      <span class="text-muted">📅 ${dateStr}</span>
    </div>`;
  openModal('modal-response');
}

async function submitResponse() {
  const requestId = document.getElementById('response-request-id').value;
  const status = document.getElementById('response-status').value;
  const message = document.getElementById('response-message').value.trim();
  
  // Upsert response
  const { error } = await sb.from('responses').upsert({
    request_id: requestId,
    user_id: currentUser.id,
    status,
    message: message || null
  }, { onConflict: 'request_id,user_id' });
  
  if (error) { showToast('❌ ' + error.message); return; }
  
  showToast('✅ Reactie verstuurd!');
  document.getElementById('response-message').value = '';
  closeModal('modal-response');
  loadRequests();
}

async function closeRequest(requestId) {
  if (!confirm('Oproep sluiten?')) return;
  await sb.from('play_requests').update({ status: 'closed' }).eq('id', requestId);
  loadRequests();
}

function filterRequests(groupId) {
  selectedGroupFilter = groupId;
  loadRequests();
}

// ======================================
// PROFILE
// ======================================
function showProfile() {
  document.getElementById('profile-info').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px">
      <div class="avatar" style="width:56px;height:56px;font-size:1.2rem">
        ${(userProfile?.full_name || 'U').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2)}
      </div>
      <div>
        <div style="font-weight:800;font-size:1.1rem">${escHtml(userProfile?.full_name || '')}</div>
        <div class="text-muted">${escHtml(currentUser?.email || '')}</div>
      </div>
    </div>
  `;
  openModal('modal-profile');
}

// ======================================
// NAVIGATION
// ======================================
function goTo(pageId) {
  document.querySelectorAll('#app-shell .page').forEach(p => {
    p.style.display = 'none';
    p.classList.remove('active');
  });
  const page = document.getElementById(pageId);
  if (page) {
    page.style.display = 'flex';
    page.classList.add('active');
  }
  
  // Update bottom nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navMap = { 'page-home': 'nav-home', 'page-requests': 'nav-requests', 'page-children': 'nav-children' };
  if (navMap[pageId]) document.getElementById(navMap[pageId])?.classList.add('active');
  
  // Load data for page
  if (pageId === 'page-home') loadHome();
  if (pageId === 'page-requests') {
    if (myGroups.length === 0) loadHome().then(loadRequests);
    else loadRequests();
  }
  if (pageId === 'page-children') loadChildren();
}

function showApp() {
  document.getElementById('page-auth').style.display = 'none';
  document.getElementById('page-auth').classList.remove('active');
  const shell = document.getElementById('app-shell');
  shell.style.display = 'flex';
  shell.style.flexDirection = 'column';
}

function showAuthPage() {
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('page-auth').style.display = 'flex';
  document.getElementById('page-auth').classList.add('active');
  currentUser = null;
  userProfile = null;
  myGroups = [];
}

// ======================================
// MODALS
// ======================================
function openModal(id) {
  // Populate groups for request modal
  if (id === 'modal-new-request') {
    const sel = document.getElementById('req-group-id');
    sel.innerHTML = myGroups.map(g => `<option value="${g.id}">${escHtml(g.name)}</option>`).join('');
    document.getElementById('req-date').value = new Date().toISOString().split('T')[0];
  }
  document.getElementById(id).classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ======================================
// HELPERS
// ======================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('📋 Code gekopieerd!'));
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ======================================
// START
// ======================================
init();
</script>
</body>
</html>
